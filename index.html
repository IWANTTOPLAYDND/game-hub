<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeonOS</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔒 LOCK SCREEN -->
<div id="lockscreen">
  <div class="lockbox">
    <h1>NeonOS</h1>
    <p>click or press any key to unlock</p>
  </div>
</div>

<!-- 🖥 DESKTOP -->
<div id="desktop">

  <div id="desktopEffects"></div>

  <div id="taskbar">
    <button data-app="library">🎮 Library</button>
    <button data-app="settings">⚙ Settings</button>
  </div>

</div>

<script src="core.js"></script>
</body>
</html>
