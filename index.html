<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeonOS</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌌 WALLPAPER -->
<div id="wallpaper"></div>

<!-- 🔒 LOCK SCREEN -->
<div id="lockscreen">
  <h1>🔒 NeonOS</h1>
  <p>Click or press any key to unlock</p>
</div>

<!-- 🖥️ DESKTOP -->
<div id="desktop">

  <!-- ICONS -->
  <div class="icon" onclick="openApp('library')">🎮 Library</div>
  <div class="icon" onclick="openApp('settings')">⚙ Settings</div>

</div>

<!-- 📊 TASKBAR -->
<div id="taskbar">
  <div class="left">NeonOS</div>

  <div class="center">
    <button onclick="openApp('library')">Library</button>
    <button onclick="openApp('settings')">Settings</button>
  </div>

  <div class="right" id="clock">00:00</div>
</div>

<script src="script.js"></script>
</body>
</html>
