<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Arcade OS Desktop</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: radial-gradient(circle at center, #1a1a2e, #0b0b12);
  color: white;
  overflow: hidden;
}

/* BOOT SCREEN */
#boot {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#desktop {
  display: none;
  width: 100%;
  height: 100vh;
}

/* TASKBAR */
#taskbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 40px;
  background: rgba(20,20,30,0.8);
  display: flex;
  align-items: center;
  padding: 0 10px;
}

/* ICONS */
.icon {
  width: 80px;
  text-align: center;
  cursor: pointer;
  margin: 20px;
  display: inline-block;
}

/* WINDOW */
.window {
  position: absolute;
  width: 300px;
  background: rgba(30,30,50,0.95);
  border: 1px solid #a78bfa;
  border-radius: 10px;
  padding: 10px;
  top: 100px;
  left: 100px;
}

.titlebar {
  cursor: move;
  background: #a78bfa;
  color: black;
  padding: 5px;
  font-weight: bold;
}

/* XP BAR */
#xpbar {
  width: 150px;
  height: 10px;
  border: 1px solid #a78bfa;
  margin-left: 10px;
}

#xpfill {
  height: 100%;
  width: 30%;
  background: #a78bfa;
}
</style>
</head>

<body>

<!-- BOOT -->
<div id="boot">
  <h1>Booting Arcade OS...</h1>
</div>

<!-- DESKTOP -->
<div id="desktop">

  <!-- ICONS -->
  <div class="icon" onclick="openApp('clicker')">🎮 Clicker</div>
  <div class="icon" onclick="openApp('snake')">🐍 Snake</div>
  <div class="icon" onclick="openApp('guess')">🎲 Guess</div>

  <!-- WINDOW AREA -->
  <div id="windows"></div>

  <!-- TASKBAR -->
  <div id="taskbar">
    XP Level:
    <div id="xpbar"><div id="xpfill"></div></div>
  </div>

</div>

<script>
/* ---------------- XP SYSTEM ---------------- */
let xp = 0;

function addXP(n){
  xp += n;
  document.getElementById("xpfill").style.width = (xp % 100) + "%";
}

/* ---------------- BOOT SEQUENCE ---------------- */
setTimeout(() => {
  document.getElementById("boot").style.display = "none";
  document.getElementById("desktop").style.display = "block";
}, 2000);

/* ---------------- WINDOW SYSTEM ---------------- */
function openApp(app){

  let win = document.createElement("div");
  win.className = "window";

  let content = "";

  if(app === "clicker"){
    content = `
      <div class="titlebar">Clicker</div>
      <p id="c">0</p>
      <button onclick="clicker()">Click</button>
    `;
  }

  if(app === "guess"){
    content = `
      <div class="titlebar">Guess Game</div>
      <input id="g">
      <button onclick="check()">Check</button>
      <p id="out"></p>
    `;
  }

  if(app === "snake"){
    content = `
      <div class="titlebar">Snake (simple)</div>
      <p>Not full snake here (kept light for demo)</p>
    `;
  }

  win.innerHTML = content;
  document.getElementById("windows").appendChild(win);

  addXP(10);
}

/* ---------------- CLICKER ---------------- */
let clicks = 0;
function clicker(){
  clicks++;
  document.getElementById("c").innerText = clicks;
  addXP(1);
}

/* ---------------- GUESS ---------------- */
let secret = Math.floor(Math.random()*10)+1;

function check(){
  let g = +document.getElementById("g").value;
  document.getElementById("out").innerText =
    g === secret ? "Correct 🎉" : "Nope";
  addXP(5);
}
</script>

</body>
</html>
